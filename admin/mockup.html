<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sparrow Admin - Layout Preview</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<header class="admin-header">
    <div class="admin-header-left">
        <button class="nav-collapse-btn" id="navCollapseBtn" title="Toggle sidebar">
            <span></span><span></span><span></span>
        </button>
        <a href="/" class="brand-logo">
            <img src="../assets/img/logo-blue.png" alt="Sparrow Logo">
        </a>
        <span class="brand-name">Sparrow Admin</span>
    </div>

    <div class="admin-header-right">
        <label class="debug-toggle-label">
            <input type="checkbox" id="debugToggle">
            Debug FE
        </label>

        <button id="btnSave" type="button">Save config</button>

        <button class="admin-tab btn-header-icon" data-file="docs" title="Documentation">
            <img src="../assets/icons/book_3s.png" alt="Docs">
            <span>Docs</span>
        </button>

        <button class="btn-header-logout">Logout</button>
    </div>
</header>

<!-- Main layout -->
<div class="admin-layout">

    <!-- Navigation sidebar -->
    <nav class="admin-nav" id="adminNav">
        <div class="nav-sections">

            <div class="nav-section open">
                <div class="nav-section-header">
                    <img class="nav-section-icon" src="../assets/icons/ballot.png" alt="">
                    <span class="nav-section-label">Data Management</span>
                    <span class="nav-chevron">▼</span>
                </div>
                <div class="nav-section-items">
                    <button class="admin-tab active" data-file="schema">
                        <img class="nav-item-icon" src="../assets/icons/ballot.png" alt="">
                        Schema
                    </button>
                    <button class="admin-tab" data-file="dashboard">
                        <img class="nav-item-icon" src="../assets/icons/ballot.png" alt="">
                        Dashboard
                    </button>
                    <button class="admin-tab" data-file="calendar">
                        <img class="nav-item-icon" src="../assets/icons/ballot.png" alt="">
                        Calendar
                    </button>
                    <button class="admin-tab" data-file="files">
                        <img class="nav-item-icon" src="../assets/icons/ballot.png" alt="">
                        Files
                    </button>
                    <button class="admin-tab" data-file="menu">
                        <img class="nav-item-icon" src="../assets/icons/ballot.png" alt="">
                        Menu Preview
                    </button>
                </div>
            </div>

            <div class="nav-section open">
                <div class="nav-section-header">
                    <img class="nav-section-icon" src="../assets/icons/ballot.png" alt="">
                    <span class="nav-section-label">Workflows</span>
                    <span class="nav-chevron">▼</span>
                </div>
                <div class="nav-section-items">
                    <button class="admin-tab" data-file="workflows">
                        <img class="nav-item-icon" src="../assets/icons/ballot.png" alt="">
                        Workflow Manager
                    </button>
                </div>
            </div>

            <div class="nav-section open">
                <div class="nav-section-header">
                    <img class="nav-section-icon" src="../assets/icons/ballot.png" alt="">
                    <span class="nav-section-label">System</span>
                    <span class="nav-chevron">▼</span>
                </div>
                <div class="nav-section-items">
                    <button class="admin-tab" data-file="database">
                        <img class="nav-item-icon" src="../assets/icons/ballot.png" alt="">
                        Database
                    </button>
                    <button class="admin-tab" data-file="users">
                        <img class="nav-item-icon" src="../assets/icons/ballot.png" alt="">
                        Users
                    </button>
                    <button class="admin-tab" data-file="health">
                        <img class="nav-item-icon" src="../assets/icons/ballot.png" alt="">
                        Health Check
                    </button>
                    <button class="admin-tab" data-file="backup">
                        <img class="nav-item-icon" src="../assets/icons/ballot.png" alt="">
                        Backup Tables
                    </button>
                    <button class="admin-tab" data-file="audit">
                        <img class="nav-item-icon" src="../assets/icons/ballot.png" alt="">
                        Audit &amp; Snapshots
                    </button>
                </div>
            </div>

            <div class="nav-section open">
                <div class="nav-section-header">
                    <img class="nav-section-icon" src="../assets/icons/ballot.png" alt="">
                    <span class="nav-section-label">Configuration</span>
                    <span class="nav-chevron">▼</span>
                </div>
                <div class="nav-section-items">
                    <button class="nav-action-btn">
                        <img class="nav-item-icon" src="../assets/icons/ballot.png" alt="">
                        Export Config
                    </button>
                    <button class="nav-action-btn">
                        <img class="nav-item-icon" src="../assets/icons/ballot.png" alt="">
                        Import Config
                    </button>
                    <button class="nav-action-btn">
                        <img class="nav-item-icon" src="../assets/icons/ballot.png" alt="">
                        Run Notifications Cron
                    </button>
                </div>
            </div>

        </div>
    </nav>

    <!-- Main content -->
    <div class="admin-main">

        <div class="admin-breadcrumb">
            <span class="breadcrumb-root">Admin</span>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-current" id="breadcrumbCurrent">Schema</span>
        </div>

        <div class="admin-content">
            <aside class="admin-sidebar" id="sidebar">
                <h3 id="sidebarTitle">Tables</h3>
                <ul id="itemList">
                    <li class="active">users</li>
                    <li>orders</li>
                    <li>products</li>
                    <li>categories</li>
                </ul>
            </aside>

            <section class="admin-workspace" id="workspace">
                <h2 style="margin-top:0;">users</h2>
                <div id="editorForm">
                    <div class="form-group">
                        <label>Display Name</label>
                        <input type="text" value="Users">
                        <span class="help-text">Name shown in menus and headings.</span>
                    </div>
                    <div class="form-group">
                        <label>Icon</label>
                        <input type="text" value="assets/icons/person.png">
                    </div>
                    <div class="column-block">
                        <h4>Column: id</h4>
                        <div class="form-group">
                            <label>Type</label>
                            <select><option>integer</option></select>
                        </div>
                    </div>
                    <div class="column-block">
                        <h4>Column: email</h4>
                        <div class="form-group">
                            <label>Type</label>
                            <select><option>text</option></select>
                        </div>
                    </div>
                </div>
            </section>
        </div>

    </div>
</div>

<script>
    document.querySelectorAll('.nav-section-header').forEach(function(h) {
        h.addEventListener('click', function() {
            h.closest('.nav-section').classList.toggle('open');
        });
    });

    document.getElementById('navCollapseBtn').addEventListener('click', function() {
        document.getElementById('adminNav').classList.toggle('collapsed');
    });

    document.querySelectorAll('.admin-tab[data-file]').forEach(function(tab) {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.admin-tab').forEach(function(t) { t.classList.remove('active'); });
            tab.classList.add('active');
            var labels = {schema:'Schema',dashboard:'Dashboard',calendar:'Calendar',files:'Files',menu:'Menu Preview',workflows:'Workflows',database:'Database',users:'Users',health:'Health Check',backup:'Backup Tables',audit:'Audit & Snapshots',docs:'Documentation'};
            document.getElementById('breadcrumbCurrent').textContent = labels[tab.dataset.file] || tab.dataset.file;
        });
    });
</script>
</body>
</html>
