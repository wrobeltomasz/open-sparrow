services:
  app:
    build: .
    volumes:
      - .:/var/www/html
      - config_data:/var/www/html/includes
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
  cron:
    build: .
    volumes:
      - .:/var/www/html
    command: >
      sh -c "echo '0 * * * * php /var/www/html/cron/cron_notifications.php'  | crontab - && crond -f"
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opensparrow
      POSTGRES_USER: sparrow
      POSTGRES_PASSWORD: sparrow
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  config_data:
