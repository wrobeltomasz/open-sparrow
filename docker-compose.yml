version: '3.9'

services:
  # PHP-FPM Application Service
  app:
    image: wrobeltom/open-sparrow:latest  # ← ZMIANA
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/login.php"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Web Server Service
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  # Background Worker (Cron) Service
  cron:
    image: wrobeltom/open-sparrow:latest  # ← ZMIANA
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    command: >
      sh -c "echo '* * * * * php /var/www/html/cron/cron_notifications.php' | crontab - && crond -f"
    depends_on:
      - db

  # PostgreSQL Database Service
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: opensparrow
      POSTGRES_USER: sparrow
      POSTGRES_PASSWORD: sparrow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparrow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata: