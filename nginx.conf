server {
    listen 80;
    root /var/www/html;
    index index.php;

    # Custom 404 error page mapping
    error_page 404 /404.php;

    # Main location handling
    # Tries to serve the requested URI as a file, then a directory, 
    # and finally falls back to index.php with the query string.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM processing
    location ~ \.php$ {
        # Connects to the 'app' service defined in docker-compose.yml on port 9000
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        
        # Passes the correct script path to PHP-FPM
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        
        # Intercept errors from PHP-FPM and display custom error pages defined above
        fastcgi_intercept_errors on;
        
        # Security: Hide PHP version for better protection
        fastcgi_hide_header X-Powered-By;
    }

    # CRITICAL SECURITY: Block direct access to sensitive directories
    # Since Nginx ignores .htaccess, we must explicitly deny access to these folders.
    location ~ ^/(includes|cron|templates|tests)/ {
        deny all;
        return 404;
    }

    # Block access to hidden files (dotfiles)
    # This covers .git, .env, .dockerignore, etc.
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Optimize performance for common assets
    # Disables logging for favicon and robots.txt to reduce noise in logs
    location = /favicon.ico { 
        log_not_found off; 
        access_log off; 
    }
    
    location = /robots.txt  { 
        access_log off; 
        log_not_found off; 
    }

    # General security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Gzip compression for faster loading
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}