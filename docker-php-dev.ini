; OpenSparrow Development PHP Configuration
; Optimized for debugging, large data handling, and local development

[PHP]
; --- Error Reporting ---
; Enable all types of errors, including notices and warnings, to catch bugs early.
error_reporting = E_ALL
display_errors = On
display_startup_errors = On
log_errors = On

; --- Resource Limits ---
; Increased memory limit to handle large JSON schemas and complex data grid exports.
memory_limit = 256M

; Maximum execution time for scripts (in seconds). 
; Useful for long-running database migrations or large CSV exports.
max_execution_time = 60

; --- File Uploads ---
; Increased limits to allow uploading larger assets or attachments if needed.
upload_max_filesize = 32M
post_max_size = 32M

; --- Timezone ---
; Setting a default timezone ensures consistency between the app and PostgreSQL.
date.timezone = UTC

; --- Performance ---
; Opcache is usually disabled in development to ensure code changes 
; are reflected immediately without clearing the cache.
opcache.enable = 0