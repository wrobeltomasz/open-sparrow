name: Release ZIP

on:
  release:
    # `created` fires before GitHub locks the release as immutable;
    # `published` fires after the lock is applied and upload returns 422.
    types: [created]

jobs:
  build-zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to attach assets to the release

    steps:
      - uses: actions/checkout@v4

      - name: Stamp VERSION file with release tag
        run: echo "${GITHUB_REF_NAME}" > includes/VERSION

      - name: Assemble and zip release package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PKG="opensparrow-${VERSION}"

          mkdir -p "dist/${PKG}"

          rsync -a \
            --exclude='.git'              \
            --exclude='.github'           \
            --exclude='.claude'           \
            --exclude='tests'             \
            --exclude='dist'              \
            --exclude='Dockerfile'        \
            --exclude='docker-compose.yml'\
            --exclude='docker-php-dev.ini'\
            --exclude='nginx.conf'        \
            --exclude='phpcs.phar'        \
            --exclude='phpcbf.phar'       \
            --exclude='phpcs.xml'         \
            --exclude='.gitignore'        \
            --exclude='CLA.md'            \
            --exclude='CODE_OF_CONDUCT.md'\
            --exclude='CONTRIBUTING.md'   \
            --exclude='SECURITY.md'       \
            --exclude='*.json'            \
            --exclude='storage/files/*'   \
            . "dist/${PKG}/"

          # Guarantee storage/files exists — PHP will write here on first upload.
          # The directory is required; its contents are never distributed.
          mkdir -p "dist/${PKG}/storage/files"
          touch    "dist/${PKG}/storage/files/.gitkeep"

          cd dist
          zip -r "${PKG}.zip" "${PKG}/"
          echo "ZIP_NAME=${PKG}.zip" >> "$GITHUB_ENV"

      - name: Attach ZIP to release
        run: gh release upload "${GITHUB_REF_NAME}" "dist/${ZIP_NAME}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
