name: Release ZIP

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. 1.0.2)'
        required: true
  push:
    tags: ['*']

jobs:
  build-zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create draft release and upload assets

    steps:
      - name: Resolve release tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "RELEASE_TAG=${TAG}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # includes/*.json is gitignored — generate clean empty starter configs
      # so the user can open the admin panel right after uploading via FTP.
      - name: Generate empty starter configs
        run: |
          echo '{"tables":{}}' > includes/schema.json
          echo '{"menu_name":"Dashboard","layout":{"columns":"repeat(auto-fit, minmax(300px, 1fr))","gap":"20px"},"widgets":[]}' \
            > includes/dashboard.json
          echo '{"menu_name":"Calendar","sources":[]}' > includes/calendar.json
          echo '{"menu_name":"Workflows","workflows":[]}' > includes/workflows.json
          echo '{"menu_name":"Files"}' > includes/files.json

      - name: Stamp VERSION file with release tag
        run: echo "${RELEASE_TAG}" > includes/VERSION

      - name: Assemble and zip release package
        run: |
          VERSION="${RELEASE_TAG}"
          PKG="opensparrow-${VERSION}"

          mkdir -p "dist/${PKG}"

          rsync -a \
            --exclude='.git'              \
            --exclude='.github'           \
            --exclude='.claude'           \
            --exclude='tests'             \
            --exclude='dist'              \
            --exclude='Dockerfile'        \
            --exclude='docker-compose.yml'\
            --exclude='docker-php-dev.ini'\
            --exclude='nginx.conf'        \
            --exclude='phpcs.phar'        \
            --exclude='phpcbf.phar'       \
            --exclude='phpcs.xml'         \
            --exclude='.gitignore'        \
            --exclude='CLA.md'            \
            --exclude='CODE_OF_CONDUCT.md'\
            --exclude='CONTRIBUTING.md'   \
            --exclude='SECURITY.md'       \
            --exclude='includes/database.json' \
            --exclude='includes/security.json' \
            --exclude='storage/files/*'   \
            . "dist/${PKG}/"

          # Guarantee storage/files exists — PHP will write here on first upload.
          # The directory is required; its contents are never distributed.
          mkdir -p "dist/${PKG}/storage/files"
          touch    "dist/${PKG}/storage/files/.gitkeep"

          cd dist
          zip -r "${PKG}.zip" "${PKG}/"
          echo "ZIP_NAME=${PKG}.zip" >> "$GITHUB_ENV"

      - name: Create draft release with ZIP or upload to existing draft
        # With release immutability enabled, assets cannot be added after publishing.
        # This step runs on tag push (before any release exists) and creates a draft
        # with the ZIP attached. The operator then adds release notes and publishes.
        run: |
          if gh release view "${RELEASE_TAG}" > /dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "dist/${ZIP_NAME}" --clobber
          else
            gh release create "${RELEASE_TAG}" "dist/${ZIP_NAME}" \
              --title "${RELEASE_TAG}" \
              --draft \
              --verify-tag
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
