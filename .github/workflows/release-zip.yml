name: Release ZIP

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag in X.Y format (e.g. 2.8)'
        required: true
  push:
    tags: ['*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build-zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create draft release and upload assets

    steps:
      - name: Resolve release tag
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "RELEASE_TAG=${TAG}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v6

      - name: Verify release tag matches OPENSPARROW_VERSION
        # Enforces the version-bump checklist: a release tag must equal the
        # semver committed in includes/version.php (tags are bare, e.g. "2.8").
        run: |
          set -euo pipefail
          PHP_VER=$(php -r "require 'includes/version.php'; echo OPENSPARROW_VERSION;")
          if [ "$PHP_VER" != "$RELEASE_TAG" ]; then
            echo "::error::Release tag '${RELEASE_TAG}' does not match OPENSPARROW_VERSION '${PHP_VER}' in includes/version.php. Bump the version files before tagging."
            exit 1
          fi

      - name: Stamp VERSION file with release tag
        run: |
          set -euo pipefail
          echo "${RELEASE_TAG}" > includes/VERSION

      - name: Assemble and zip release package
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG}"
          PKG="opensparrow-${VERSION}"

          mkdir -p "dist/${PKG}"

          rsync -a \
            --exclude='.git'              \
            --exclude='.github'           \
            --exclude='.claude'           \
            --exclude='tests'             \
            --exclude='dist'              \
            --exclude='tmp/sess_*'        \
            --exclude='temp'              \
            --exclude='cache'             \
            --exclude='node_modules'      \
            --exclude='cypress'           \
            --exclude='.cypress-cache'    \
            --exclude='cypress.config.js' \
            --exclude='package.json'      \
            --exclude='package-lock.json' \
            --exclude='composer.json'     \
            --exclude='Dockerfile'        \
            --exclude='docker-compose.yml'\
            --exclude='docker-php-dev.ini'\
            --exclude='docker-compose.override.yml' \
            --exclude='nginx.conf'        \
            --exclude='.dockerignore'     \
            --exclude='phpcs.phar'        \
            --exclude='phpcbf.phar'       \
            --exclude='phpcs.xml'         \
            --exclude='phpunit.xml'       \
            --exclude='.phpunit.result.cache' \
            --exclude='.gitignore'        \
            --exclude='CLAUDE.md'         \
            --exclude='CLA.md'            \
            --exclude='CODE_OF_CONDUCT.md'\
            --exclude='CONTRIBUTING.md'   \
            --exclude='SECURITY.md'       \
            --exclude='config/*.example'  \
            --exclude='includes/.secret_salt' \
            --exclude='storage/files/*'   \
            . "dist/${PKG}/"

          # Guarantee storage/files exists — PHP will write here on first upload.
          # The directory is required; its contents are never distributed.
          mkdir -p "dist/${PKG}/storage/files"
          touch    "dist/${PKG}/storage/files/.gitkeep"

          cd dist
          zip -r "${PKG}.zip" "${PKG}/"
          echo "ZIP_NAME=${PKG}.zip" >> "$GITHUB_ENV"

      - name: Create draft release with ZIP or upload to existing draft
        # With release immutability enabled, assets cannot be added after publishing.
        # This step runs on tag push (before any release exists) and creates a draft
        # with the ZIP attached. The operator then adds release notes and publishes.
        run: |
          if gh release view "${RELEASE_TAG}" > /dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "dist/${ZIP_NAME}" --clobber
          else
            gh release create "${RELEASE_TAG}" "dist/${ZIP_NAME}" \
              --title "${RELEASE_TAG}" \
              --draft \
              --verify-tag
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
