name: Update Directory Tree

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-readme-tree:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate and Update Tree
        run: |

          sudo apt-get install -y tree
          
          tree -I '.git|.github|vendor|node_modules|assets/img' -a --noreport > tree_output.txt       

          python3 -c "
          import os
          start_marker = ''
          end_marker = ''
          
          with open('README.md', 'r') as f:
              readme = f.read()
              
          with open('tree_output.txt', 'r') as f:
              tree_content = f.read()
          
          if start_marker in readme and end_marker in readme:

              new_tree_section = f'{start_marker}\n```text\n{tree_content}```\n{end_marker}'
              
              import re
              pattern = re.compile(f'{start_marker}.*?{end_marker}', re.DOTALL)
              new_readme = pattern.sub(new_tree_section, readme)
              
              with open('README.md', 'w') as f:
                  f.write(new_readme)
          else:
              print('Error: No markers found in README.md')
              exit(1)
          "

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: automatic directory tree update [skip ci]"
          file_pattern: 'README.md'