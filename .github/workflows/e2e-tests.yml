name: E2E Cypress Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  cypress:
    if: false  # tymczasowo wyłączone — testy w trakcie dopracowania
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start OpenSparrow stack (Docker)
        run: docker compose up -d --build

      - name: Wait for services to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/login.php && break
            sleep 2
          done

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          headed: false
        env:
          CYPRESS_TEST_USERNAME: ${{ secrets.TEST_USERNAME || 'test' }}
          CYPRESS_TEST_PASSWORD: ${{ secrets.TEST_PASSWORD || 'test' }}

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
