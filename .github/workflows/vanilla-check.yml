name: Vanilla Code Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  check-for-frameworks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for forbidden libraries
        run: |
          # Match library names only in import/require/script-src contexts to avoid
          # false positives from plain English prose (e.g. "at the moment of execution").
          FORBIDDEN="bootstrap|tailwind|jquery|bulma|foundation|react|vue|angular|materialize|uikit|semantic|svelte|ember|alpine|lodash|underscore|axios|moment|popper"

          echo "Scanning assets and templates for forbidden frameworks..."

          if grep -Eirn \
               -e "(import|require)\s*\(?\s*['\"]($FORBIDDEN)" \
               -e "<script[^>]+src=['\"][^'\"]*($FORBIDDEN)" \
               -e "cdn\.jsdelivr\.net|unpkg\.com|cdnjs\.cloudflare\.com" \
               assets templates admin includes ./*.php \
               --exclude-dir={.git,vendor,node_modules,.github} \
               --exclude={README.md,COPYING,LICENCE,Dockerfile,docker-compose.yml}; then
            echo "--------------------------------------------------------"
            echo "ERROR: Forbidden library detected in application code!"
            echo "Please ensure you are using Vanilla JS/CSS."
            echo "--------------------------------------------------------"
            exit 1
          else
            echo "Clean code! No unauthorized libraries found in app folders."
          fi