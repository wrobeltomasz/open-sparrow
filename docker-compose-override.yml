# docker-compose.override.yml
# Development overrides — applied automatically by Docker Compose
# DO NOT commit this file (.gitignore)

services:
  db:
    restart: unless-stopped
    environment:
      POSTGRES_DB: opensparrow
      POSTGRES_USER: sparrow
      POSTGRES_PASSWORD: sparrow
    ports:
      - "5432:5432"  # Expose DB to host for local tools (DBeaver, psql)

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: development
      SECURE_COOKIES: "false"
      PGHOST: db             # Connect to db container, not localhost
      PGUSER: sparrow        # Must match POSTGRES_USER above
      PGPASSWORD: sparrow    # Must match POSTGRES_PASSWORD above
    volumes:
      - .:/var/www/html:cached

  nginx:
    restart: unless-stopped
    ports:
      - "8080:80"  # Override production port 80 → 8080

  cron:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: development
      PGHOST: db             # Connect to db container, not localhost
      PGUSER: sparrow        # Must match POSTGRES_USER above
      PGPASSWORD: sparrow    # Must match POSTGRES_PASSWORD above
